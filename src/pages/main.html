<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Apple Shop</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
<header>
    <h1>Apple Shop</h1>
    <div class="controls">
        <input type="text" id="search" placeholder="Поиск товара...">
        <select id="sort">
            <option value="">Сортировка</option>
            <option value="price">Цена ↑</option>
            <option value="price_rev">Цена ↓</option>
            <option value="name">Название</option>
        </select>
        <select id="filter">
            <option value="">Все категории</option>
            <option value="iphone">iPhone</option>
            <option value="macbook">MacBook</option>
            <option value="ipad">iPad</option>
            <option value="watch">Apple Watch</option>
            <option value="airpods">AirPods</option>
        </select>
        <button id="cartBtn">🛒 Корзина</button>
    </div>
</header>
<main>
    <div id="products" class="products"></div>
</main>
<script>
async function loadProducts() {

    const search = document.getElementById("search").value
    const sort = document.getElementById("sort").value
    const filter = document.getElementById("filter").value

    const response = await fetch(`/products?search=${search}&sort=${sort}&filter=${filter}`)
    const products = await response.json()

    const container = document.getElementById("products")
    container.innerHTML = ""

    products.forEach(product => {

        const card = document.createElement("div")
        card.className = "product"

        card.innerHTML = `
            <img src="${product.image}" />
            <h3>${product.name}</h3>
            <p>${product.price} $</p>
            <button onclick="addToCart('${product.id}')">В корзину</button>
        `

        container.appendChild(card)
    })
}

function addToCart(id) {
    fetch(`/cart/${id}`, {
        method: "POST"
    })
    alert("Товар добавлен в корзину")
}

document.getElementById("search").addEventListener("input", loadProducts)
document.getElementById("sort").addEventListener("change", loadProducts)
document.getElementById("filter").addEventListener("change", loadProducts)
loadProducts()
</script>
</body>
</html>
